<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão - Votações</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>

<body>

<div class="header">
  <h1>Gestão de Votações</h1>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<div class="container">

  <!-- CRIAR VOTAÇÃO -->
  <h2>Criar Nova Votação</h2>

  <input type="text" id="nome" placeholder="Nome da votação">
  <textarea id="descricao" placeholder="Descrição"></textarea>
  <input type="text" id="opcoes" placeholder="Opções separadas por vírgula">

  <button class="btn-primary" onclick="criarVotacao()">Criar</button>

  <p id="msg"></p>

  <hr style="margin:30px 0; border-color:#555;">

  <!-- LISTA DE VOTAÇÕES -->
  <h2>Votações Existentes</h2>

  <ul id="listaVotacoes">
    <li>Carregando...</li>
  </ul>

</div>

<script>
// 🔒 PROTEÇÃO
if(localStorage.getItem("usuario") !== "gestao") {
  window.location.href = "index.html";
}

const firebaseConfig = {
  apiKey: "AIzaSyDZssXDFKXN0g48vAG_uYDT1qQiAvZeejc",
  authDomain: "learnup-cc.firebaseapp.com",
  databaseURL: "https://learnup-cc-default-rtdb.firebaseio.com",
  projectId: "learnup-cc",
  storageBucket: "learnup-cc.appspot.com",
  messagingSenderId: "562099376652",
  appId: "1:562099376652:web:6b5a96b92843f619485429"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ CRIAR VOTAÇÃO
function criarVotacao() {
  const nome = document.getElementById('nome').value;
  const descricao = document.getElementById('descricao').value;
  const opcoesTexto = document.getElementById('opcoes').value;

  if(!nome || !opcoesTexto) {
    document.getElementById('msg').innerText = "Preencha os campos!";
    return;
  }

  const opcoesArray = opcoesTexto.split(',');
  const opcoes = {};

  opcoesArray.forEach((opt, i) => {
    opcoes["op" + i] = {
      nome: opt.trim(),
      votos: 0
    };
  });

  db.ref('votacoes').push({
    nome,
    descricao,
    opcoes
  });

  document.getElementById('msg').innerText = "Votação criada!";
}

// 👀 LISTAR + RESULTADOS
db.ref('votacoes').on('value', snapshot => {
  const votacoes = snapshot.val();
  const lista = document.getElementById('listaVotacoes');
  lista.innerHTML = '';

  if(votacoes){
    Object.keys(votacoes).forEach(key => {
      const vot = votacoes[key];
      const li = document.createElement('li');

      li.innerHTML = `<b>${vot.nome}</b><br>${vot.descricao}<br><br>`;

      // RESULTADOS
      Object.keys(vot.opcoes).forEach(optKey => {
        const opt = vot.opcoes[optKey];

        const p = document.createElement('p');
        p.textContent = `${opt.nome}: ${opt.votos} votos`;

        li.appendChild(p);
      });

      // BOTÃO EXCLUIR
      const btnDelete = document.createElement('button');
      btnDelete.textContent = "Excluir";
      btnDelete.style.background = "red";

      btnDelete.onclick = () => {
        if(confirm("Tem certeza que deseja excluir?")) {
          db.ref('votacoes/' + key).remove();
        }
      };

      li.appendChild(btnDelete);

      lista.appendChild(li);
    });
  } else {
    lista.innerHTML = '<li>Nenhuma votação encontrada</li>';
  }
});

// 🚪 LOGOUT
function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}
</script>

</body>
</html>
